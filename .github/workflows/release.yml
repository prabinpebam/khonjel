name: Release

# Builds the Windows app and publishes it to a GitHub Release when a version tag is pushed.
# Release flow:
#   1. Bump "version" in app/package.json (run `npm install --package-lock-only` to sync the lock).
#   2. Commit on main.
#   3. git tag vX.Y.Z && git push origin vX.Y.Z   (the tag MUST match the package.json version)
# electron-builder publishes the NSIS installer (which auto-updates), the portable .exe, and the
# electron-updater metadata (latest.yml + .blockmap) to a release for the tag. Signing can be added
# later as a step before "Build + publish" (e.g. SignPath or Azure Trusted Signing) -- nothing else
# in this workflow needs to change.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build + publish (NSIS installer, portable, update metadata)
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
