name: Release

# Builds the portable Windows app and publishes it as a GitHub Release whenever a version tag is
# pushed. To cut a release:
#   1. Bump "version" in app/package.json (and run `npm install --package-lock-only` to sync the lock).
#   2. Commit that on main.
#   3. git tag vX.Y.Z && git push origin vX.Y.Z
# The tag push triggers this workflow, which rebuilds on a clean Windows runner and attaches
# Khonjel-<version>-portable.exe to a release for the tag.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-portable:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build portable (.exe)
        run: npm run package

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/release/Khonjel-*-portable.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
